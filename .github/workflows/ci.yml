name: CI Pipeline

on:
  push:
    branches:
      - develop
      - main
  pull_request:
    branches:
      - develop
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run migrations
        env:
          USE_SQLITE: "true"
        run: |
          python manage.py migrate

      - name: Run tests
        env:
          USE_SQLITE: "true"
        run: |
          pytest --cov=soporte --cov-fail-under=100
    