version: '3.9'

services:
  db:
    image: postgres:15
    container_name: helpdesk_db
    restart: always
    environment:
      POSTGRES_DB: helpdesk
      POSTGRES_USER: helpdesk_user
      POSTGRES_PASSWORD: helpdesk_pass
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U helpdesk_user"]
      interval: 5s
      timeout: 5s
      retries: 5
    
  web:
    build: .
    container_name: helpdesk_web
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_NAME: helpdesk
      DB_USER: helpdesk_user
      DB_PASSWORD: helpdesk_pass
      DB_HOST: db
      DB_PORT: 5432
      
volumes:
  postgres_data:

